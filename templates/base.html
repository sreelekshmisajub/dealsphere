<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DealSphere - Smart Shopping Comparison{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/main.css" rel="stylesheet">
    
    {% block extra_css %}{% endblock %}
    
    <style>
        /* Small inline fixes for template rendering */
        .navbar-premium .badge {
            font-size: 0.65rem;
            padding: 0.25rem 0.4rem;
        }
    </style>
</head>
<body>
    <!-- Messages Container -->
    {% if messages %}
        <div class="position-fixed top-0 start-50 translate-middle-x mt-5 z-3" style="min-width: 300px;">
            {% for message in messages %}
                <div class="alert glass border-0 border-start border-4 border-{{ message.tags|default:'primary' }} alert-dismissible fade show shadow-lg mb-3 animate-fade-in-up" role="alert">
                    <div class="d-flex align-items-center">
                        {% if message.tags == 'success' %}
                            <i class="fas fa-check-circle text-success me-3 fs-4"></i>
                        {% elif message.tags == 'error' %}
                            <i class="fas fa-exclamation-circle text-danger me-3 fs-4"></i>
                        {% else %}
                            <i class="fas fa-info-circle text-primary me-3 fs-4"></i>
                        {% endif %}
                        <div>{{ message }}</div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <!-- Main Content Area -->
    <main class="min-vh-100">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
